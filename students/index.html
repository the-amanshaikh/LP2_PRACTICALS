<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Student Portal</title>
    <!-- React & Tailwind CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [students, setStudents] = React.useState([]);
            const [form, setForm] = React.useState({ name: '', rollNo: '', course: '' });
            const [editingId, setEditingId] = React.useState(null);

            React.useEffect(() => { fetchStudents(); }, []);

            const fetchStudents = async () => {
                const res = await fetch('/api/students');
                const data = await res.json();
                setStudents(data);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (editingId) {
                    await fetch(`/api/students/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form)
                    });
                    setEditingId(null);
                } else {
                    await fetch('/api/students', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form)
                    });
                }
                setForm({ name: '', rollNo: '', course: '' });
                fetchStudents();
            };

            const handleDelete = async (id) => {
                await fetch(`/api/students/${id}`, { method: 'DELETE' });
                fetchStudents();
            };

            const handleEdit = (student) => {
                setForm({ name: student.name, rollNo: student.rollNo, course: student.course });
                setEditingId(student._id);
            };

            return (
                <div class="max-w-5xl mx-auto py-10 px-4">
                    {/* Header */}
                    <div class="mb-10 text-center">
                        <h1 class="text-4xl font-extrabold text-blue-900 tracking-tight">Cloud Student Portal</h1>
                        <p class="text-gray-500 mt-2">Secure Record Management System</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {/* Form Card */}
                        <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-lg border border-gray-100">
                            <h2 class="text-xl font-bold text-gray-700 mb-4">
                                {editingId ? "Update Record" : "New Enrollment"}
                            </h2>
                            <form onSubmit={handleSubmit} class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-600">Full Name</label>
                                    <input type="text" required value={form.name} onChange={e => setForm({...form, name: e.target.value})} 
                                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" placeholder="John Doe" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-600">Roll Number</label>
                                    <input type="text" required value={form.rollNo} onChange={e => setForm({...form, rollNo: e.target.value})} 
                                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" placeholder="CS-2026-01" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-600">Course</label>
                                    <input type="text" required value={form.course} onChange={e => setForm({...form, course: e.target.value})} 
                                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" placeholder="Computer Engineering" />
                                </div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors shadow-md mt-4">
                                    {editingId ? "Save Changes" : "Register Student"}
                                </button>
                                {editingId && (
                                    <button type="button" onClick={() => {setEditingId(null); setForm({ name: '', rollNo: '', course: '' });}} class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg transition-colors mt-2">
                                        Cancel Edit
                                    </button>
                                )}
                            </form>
                        </div>

                        {/* Data Table Card */}
                        <div class="md:col-span-2 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                <h2 class="text-lg font-bold text-gray-700">Active Directory</h2>
                                <span class="px-3 py-1 bg-blue-100 text-blue-800 text-xs font-semibold rounded-full">{students.length} Records</span>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-white border-b border-gray-200">
                                            <th class="px-6 py-4 text-sm font-semibold text-gray-600">Student Name</th>
                                            <th class="px-6 py-4 text-sm font-semibold text-gray-600">Roll No.</th>
                                            <th class="px-6 py-4 text-sm font-semibold text-gray-600">Course</th>
                                            <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        {students.length === 0 ? (
                                            <tr><td colSpan="4" class="px-6 py-8 text-center text-gray-400">No students registered yet.</td></tr>
                                        ) : (
                                            students.map((s) => (
                                                <tr key={s._id} class="hover:bg-gray-50 transition-colors">
                                                    <td class="px-6 py-4 font-medium text-gray-800">{s.name}</td>
                                                    <td class="px-6 py-4 text-gray-500">{s.rollNo}</td>
                                                    <td class="px-6 py-4 text-gray-500">{s.course}</td>
                                                    <td class="px-6 py-4 text-right space-x-2">
                                                        <button onClick={() => handleEdit(s)} class="text-sm px-3 py-1 bg-yellow-100 text-yellow-700 hover:bg-yellow-200 rounded-md font-medium transition-colors">Edit</button>
                                                        <button onClick={() => handleDelete(s._id)} class="text-sm px-3 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded-md font-medium transition-colors">Delete</button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
