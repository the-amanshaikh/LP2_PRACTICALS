<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova | Premium Electronics</title>
    <!-- React & Tailwind CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [products, setProducts] = React.useState([]);
            const [cart, setCart] = React.useState([]);
            const [isCartOpen, setIsCartOpen] = React.useState(false);

            // Fetch products from our MongoDB backend when the page loads
            React.useEffect(() => {
                fetch('/api/products')
                    .then(res => res.json())
                    .then(data => setProducts(data));
            }, []);

            const addToCart = (product) => {
                const existing = cart.find(item => item._id === product._id);
                if (existing) {
                    setCart(cart.map(item => item._id === product._id ? { ...item, qty: item.qty + 1 } : item));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(item => item._id !== id));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);

            return (
                <div>
                    {/* Navigation Bar */}
                    <nav class="bg-white shadow-sm sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">TECHNOVA</h1>
                            <button onClick={() => setIsCartOpen(!isCartOpen)} class="relative p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="text-gray-700"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                {cartCount > 0 && (
                                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-md">
                                        {cartCount}
                                    </span>
                                )}
                            </button>
                        </div>
                    </nav>

                    <div class="max-w-7xl mx-auto px-4 py-8">
                        {isCartOpen ? (
                            /* Cart View */
                            <div class="bg-white p-8 rounded-2xl shadow-lg max-w-3xl mx-auto border border-gray-100">
                                <div class="flex justify-between items-center mb-6">
                                    <h2 class="text-3xl font-bold text-gray-800">Your Shopping Cart</h2>
                                    <button onClick={() => setIsCartOpen(false)} class="text-indigo-600 font-semibold hover:underline">Continue Shopping</button>
                                </div>
                                
                                {cart.length === 0 ? (
                                    <div class="text-center py-10 text-gray-500">Your cart is empty.</div>
                                ) : (
                                    <div class="space-y-4">
                                        {cart.map(item => (
                                            <div key={item._id} class="flex items-center justify-between border-b pb-4">
                                                <div class="flex items-center space-x-4">
                                                    <img src={item.image} alt={item.name} class="w-16 h-16 object-cover rounded-lg shadow-sm" />
                                                    <div>
                                                        <h3 class="font-bold text-gray-800">{item.name}</h3>
                                                        <p class="text-gray-500 text-sm">Qty: {item.qty} x ${item.price}</p>
                                                    </div>
                                                </div>
                                                <div class="flex items-center space-x-4">
                                                    <span class="font-bold text-lg">${item.price * item.qty}</span>
                                                    <button onClick={() => removeFromCart(item._id)} class="text-red-500 hover:text-red-700 text-sm font-semibold">Remove</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div class="pt-6 flex justify-between items-center">
                                            <span class="text-xl text-gray-500">Subtotal</span>
                                            <span class="text-3xl font-black text-gray-800">${cartTotal.toLocaleString()}</span>
                                        </div>
                                        
                                        {/* FULLY UPDATED DATABASE CHECKOUT BUTTON */}
                                        <button 
                                            onClick={async () => { 
                                                // 1. Send the cart data to the backend database
                                                await fetch('/api/checkout', {
                                                    method: 'POST',
                                                    headers: { 'Content-Type': 'application/json' },
                                                    body: JSON.stringify({ cart: cart, total: cartTotal })
                                                });
                                                
                                                // 2. Alert the user and reset the cart
                                                alert('Payment Success! Order saved to MongoDB.'); 
                                                setCart([]); 
                                                setIsCartOpen(false); 
                                            }} 
                                            class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg mt-6">
                                            Proceed to Secure Checkout
                                        </button>

                                    </div>
                                )}
                            </div>
                        ) : (
                            /* Storefront Grid */
                            <div>
                                <div class="mb-8 text-center md:text-left">
                                    <h2 class="text-4xl font-extrabold text-gray-900">Featured Products</h2>
                                    <p class="text-gray-500 mt-2">Discover the latest in premium tech.</p>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {products.map(product => (
                                        <div key={product._id} class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 border border-gray-100 flex flex-col">
                                            <div class="h-56 overflow-hidden">
                                                <img src={product.image} alt={product.name} class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" />
                                            </div>
                                            <div class="p-6 flex flex-col flex-grow">
                                                <span class="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">{product.category}</span>
                                                <h3 class="text-xl font-bold text-gray-800 mb-2">{product.name}</h3>
                                                <p class="text-gray-500 text-sm mb-4 flex-grow">{product.description}</p>
                                                <div class="flex items-center justify-between mt-auto">
                                                    <span class="text-2xl font-black text-gray-900">${product.price}</span>
                                                    <button onClick={() => addToCart(product)} class="bg-black text-white px-5 py-2 rounded-lg font-semibold hover:bg-gray-800 transition active:scale-95">
                                                        Add to Cart
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
