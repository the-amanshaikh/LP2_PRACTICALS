<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechInsights | Engineering Blog</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F9FAFB] font-sans text-gray-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [posts, setPosts] = React.useState([]);
            const [isWriting, setIsWriting] = React.useState(false);
            const [form, setForm] = React.useState({ title: '', author: '', content: '', tags: '' });

            React.useEffect(() => { fetchPosts(); }, []);

            const fetchPosts = async () => {
                const res = await fetch('/api/posts');
                const data = await res.json();
                setPosts(data);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const postData = {
                    ...form,
                    tags: form.tags.split(',').map(tag => tag.trim()).filter(tag => tag)
                };
                
                await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postData)
                });
                
                setForm({ title: '', author: '', content: '', tags: '' });
                setIsWriting(false);
                fetchPosts();
            };

            const handleDelete = async (id) => {
                if(confirm('Are you sure you want to delete this post?')) {
                    await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                    fetchPosts();
                }
            };

            const formatDate = (dateString) => {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                return new Date(dateString).toLocaleDateString(undefined, options);
            };

            return (
                <div>
                    {/* Minimalist Navbar */}
                    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
                        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div class="flex items-center space-x-2">
                                <div class="w-8 h-8 bg-black rounded flex items-center justify-center">
                                    <span class="text-white font-bold text-xl leading-none tracking-tighter">T</span>
                                </div>
                                <h1 class="text-xl font-bold tracking-tight text-gray-900">TechInsights.</h1>
                            </div>
                            <button onClick={() => setIsWriting(!isWriting)} class="bg-black hover:bg-gray-800 text-white px-5 py-2 rounded-full font-medium transition text-sm flex items-center space-x-2 shadow-sm">
                                <span>{isWriting ? 'Cancel Writing' : 'Write a Story'}</span>
                            </button>
                        </div>
                    </nav>

                    <main class="max-w-3xl mx-auto px-4 py-10">
                        
                        {/* The Writing Editor (Slides down when button is clicked) */}
                        {isWriting && (
                            <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 mb-12 animate-[fadeIn_0.3s_ease-out]">
                                <h2 class="text-2xl font-bold mb-6 text-gray-800">Draft New Post</h2>
                                <form onSubmit={handleSubmit} class="space-y-5">
                                    <div>
                                        <input type="text" required placeholder="Post Title" value={form.title} onChange={e => setForm({...form, title: e.target.value})} 
                                            class="w-full text-3xl font-bold text-gray-900 placeholder-gray-300 focus:outline-none bg-transparent" />
                                    </div>
                                    <div class="flex space-x-4">
                                        <input type="text" required placeholder="Author Name" value={form.author} onChange={e => setForm({...form, author: e.target.value})} 
                                            class="w-1/2 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition" />
                                        <input type="text" placeholder="Tags (comma separated)" value={form.tags} onChange={e => setForm({...form, tags: e.target.value})} 
                                            class="w-1/2 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition" />
                                    </div>
                                    <div>
                                        <textarea required placeholder="Tell your story..." value={form.content} onChange={e => setForm({...form, content: e.target.value})} rows="8"
                                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition resize-none"></textarea>
                                    </div>
                                    <div class="flex justify-end pt-2">
                                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-8 py-2.5 rounded-full font-bold transition shadow-md">
                                            Publish Post
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* Blog Feed */}
                        <div class="space-y-12">
                            {posts.map(post => (
                                <article key={post._id} class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow group relative">
                                    {/* Delete Button (Hidden until hover) */}
                                    <button onClick={() => handleDelete(post._id)} class="absolute top-6 right-6 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                    </button>

                                    <div class="flex items-center space-x-3 mb-3">
                                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold">
                                            {post.author.charAt(0)}
                                        </div>
                                        <div>
                                            <p class="font-semibold text-gray-900 text-sm">{post.author}</p>
                                            <p class="text-gray-500 text-xs">{formatDate(post.publishDate)}</p>
                                        </div>
                                    </div>
                                    
                                    <h2 class="text-3xl font-extrabold text-gray-900 mb-3 tracking-tight">{post.title}</h2>
                                    <p class="text-gray-600 leading-relaxed mb-6 whitespace-pre-wrap">{post.content}</p>
                                    
                                    <div class="flex flex-wrap gap-2">
                                        {post.tags.map((tag, i) => (
                                            <span key={i} class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-medium">
                                                #{tag}
                                            </span>
                                        ))}
                                    </div>
                                </article>
                            ))}
                            {posts.length === 0 && (
                                <div class="text-center py-20 text-gray-400">
                                    <p class="text-xl">No stories published yet.</p>
                                </div>
                            )}
                        </div>

                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
